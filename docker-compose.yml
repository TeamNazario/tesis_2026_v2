services:

  # ─── Base de datos MySQL ────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: biofluid-mysql
    command: --lower-case-table-names=1
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-biofluid123}
    ports:
      - "3306:3306"
    volumes:
      # Persistencia de datos de MySQL
      - mysql_data:/var/lib/mysql
      # Script de inicialización limpio (sin SELECT * que causan errores en Docker)
      - ./docker/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - biofluid-network

  # ─── Backend Spring Boot ────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biofluid-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # Conexión a base de datos (apunta al servicio mysql del compose)
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-biofluid_db}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-biofluid123}
      # Seguridad JWT
      APP_TOKEN_SECRET: ${APP_TOKEN_SECRET:-change-this-secret-in-production-at-least-32-bytes}
      APP_TOKEN_EXPIRATION_MINUTES: ${APP_TOKEN_EXPIRATION_MINUTES:-120}
      # API externa Peru (opcional)
      APISPERU_TOKEN: ${APISPERU_TOKEN:-}
      # API Key para integraciones externas (n8n)
      APP_API_KEY: ${APP_API_KEY:-biofluid-n8n-api-key-2026}
      # CORS: orígenes permitidos (incluye ngrok wildcards)
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:3000,http://localhost:5173,https://*.ngrok-free.app,https://*.ngrok.io}
      # Directorio de PDFs de cotizaciones (dentro del contenedor)
      APP_COTIZACIONES_DIR: /app/storage/cotizaciones
      # Flyway: marcar la BD como ya en versión 4 (schema ya está aplicado por bd_tesis.sql)
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "4"
    ports:
      - "8080:8080"
    volumes:
      # Persistencia de PDFs de cotizaciones generados
      - cotizaciones_data:/app/storage/cotizaciones
    networks:
      - biofluid-network

  # ─── Frontend Angular (Nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: biofluid-frontend
    depends_on:
      - backend
    ports:
      - "4200:80"
    networks:
      - biofluid-network

# ─── Volúmenes persistentes ─────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  cotizaciones_data:
    driver: local

# ─── Red interna ────────────────────────────────────────────────────────────
networks:
  biofluid-network:
    driver: bridge
