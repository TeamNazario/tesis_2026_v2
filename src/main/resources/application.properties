spring.application.name=demo
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:biofluid_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.business.igv-rate=0.18
app.files.cotizaciones-dir=${APP_COTIZACIONES_DIR:storage/cotizaciones}
app.cotizaciones.vencimiento-cron=${APP_COTIZACIONES_VENCIMIENTO_CRON:0 0 * * * *}

# Recomendado: al mens 32 bytes para JWT HS256.
app.security.token-secret=${APP_TOKEN_SECRET:change-this-secret-in-production-at-least-32-bytes}
app.security.token-expiration-minutes=${APP_TOKEN_EXPIRATION_MINUTES:120}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

external.apisperu.base-url=https://dniruc.apisperu.com/api/v1
external.apisperu.token=${APISPERU_TOKEN:}
external.apisperu.connect-timeout=5000
external.apisperu.read-timeout=10000
